id: arch:node_lifecycle
content: |
  Nodes have status: active -> dirty -> stale -> deprecated.
  dirty: source_files changed (md5 hash mismatch), detected by engram status.
  stale: not touched in 30+ days, reported by engram status.
  deprecated: manually set via engram node deprecate, removed from search index.
  Weight decay runs during engram status: -1 after 30 days, -5 after 90 days untouched.
  Weight increases +1 on each traversal visit (capped at 100).
