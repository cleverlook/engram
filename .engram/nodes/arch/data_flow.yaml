id: arch:data_flow
content: |
  Every node mutation (create/update/deprecate) triggers three side effects in order:
  1. YAML write (storage::save_node) — source of truth
  2. Index update (indexing::update_index_for_node + update_backlinks_for_node)
  3. SQLite sync (db::upsert_node) — derived FTS5 cache
  YAML is always the source of truth. SQLite is rebuilt from YAML via rebuild-index.
  On deprecate: node is removed from _index.yaml and SQLite FTS (not searchable).
