id: arch:agent_interfaces
content: |-
  Engram CLI provides three interfaces for AI agents:
  1. Flags — quick path: engram node create x:y -c "content" -w 70 --add-edge "a:b:related:50" --add-source-file src/main.rs
  2. Stdin pipe — partial YAML for multiline/complex nodes. Only provide fields you want to set (create) or change (update). Defaults/existing fields preserved via serde_yaml::Value merge.
  3. Direct YAML edit + engram rebuild-index — full control, bulk operations.
  SKILL.md is the source of truth for agents. Every example in it must work as-is.
