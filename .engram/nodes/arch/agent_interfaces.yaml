id: arch:agent_interfaces
content: |
  Engram CLI provides three interfaces for AI agents:
  1. Flags — quick path for simple ops: engram node create x:y -c "content" -w 70
  2. Stdin pipe — partial YAML for multiline content and complex metadata
  3. Direct YAML edit + engram rebuild-index — full control, bulk operations
  Each interface has trade-offs. Flags can't do multiline or edges (yet).
  Stdin requires partial YAML support (in progress). Direct edit always works.
  SKILL.md must accurately document all three as the source of truth for agents.
