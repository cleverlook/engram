id: arch:traversal
content: |
  Graph traversal uses weighted BFS with BinaryHeap (max-heap by edge weight).
  Parameters: budget (default 4000 chars), max_depth (default 5), min_weight (default 0).
  Behavior: skips deprecated nodes, annotates dirty nodes as [POSSIBLY STALE].
  Side effects: updates touched date and increments weight (+1, capped at 100) for visited nodes.
  Traversal stops on: cycle, budget exhausted, max depth, all neighbors visited.
